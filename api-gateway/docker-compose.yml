version: '3.8'

services:
  workspace-java-gateway:
    image: maven:3.9-eclipse-temurin-21
    container_name: entorno_programacion_gateway
    ports:
      - "8080:8080"
    networks:
      - red_interna_gateway
    command: tail -f /dev/null
    volumes:
      - .:/app
    working_dir: /app

networks:
  red_interna_gateway: